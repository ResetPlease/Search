<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CryptoSearch</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { text-align: center; width: 600px; }
        h1 { font-size: 2.4em; color: #58a6ff; margin-bottom: 8px; }
        .subtitle { color: #8b949e; margin-bottom: 30px; font-size: 0.95em; }
        form { display: flex; gap: 8px; }
        input[type="text"] { flex: 1; padding: 12px 16px; border: 1px solid #30363d; border-radius: 6px; background: #161b22; color: #c9d1d9; font-size: 1em; outline: none; }
        input[type="text"]:focus { border-color: #58a6ff; }
        button { padding: 12px 24px; background: #238636; color: #fff; border: none; border-radius: 6px; font-size: 1em; cursor: pointer; }
        button:hover { background: #2ea043; }
        .hint { margin-top: 16px; color: #8b949e; font-size: 0.85em; }
        .hint code { background: #21262d; padding: 2px 6px; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>CryptoSearch</h1>
        <p class="subtitle">Boolean search engine for cryptocurrency & blockchain news</p>
        <form action="/search" method="get">
            <input type="text" name="q" placeholder="Enter search query..." autofocus>
            <button type="submit">Search</button>
        </form>
        <p class="hint">
            Syntax: <code>&&</code> AND, <code>||</code> OR, <code>!</code> NOT, parentheses supported
        </p>
    </div>
</body>
</html>
